services:
  - type: web
    name: hrecruiter-backend
    env: python
    plan: free
    rootDir: talentlens-ai/backend
    buildCommand: python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 10000

  - type: web
    name: hrecruiter-frontend
    env: node
    plan: free
    rootDir: talentlens-ai/frontend
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hrecruiter-backend.onrender.com
      - key: PORT
        value: 10000
