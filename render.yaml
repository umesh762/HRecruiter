services:
  - type: web
    name: hrecruiter-backend
    env: docker
    plan: free
    dockerfilePath: talentlens-ai/backend/Dockerfile
    dockerContext: talentlens-ai/backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 10000

  - type: web
    name: hrecruiter-frontend
    env: docker
    plan: free
    dockerfilePath: talentlens-ai/frontend/Dockerfile
    dockerContext: talentlens-ai/frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hrecruiter-backend.onrender.com
      - key: PORT
        value: 10000
